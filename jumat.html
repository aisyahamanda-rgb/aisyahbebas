<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Pink Soft Gradient</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Warna Pink Soft Gradient */
    .bg-pink-gradient {
      background: linear-gradient(135deg, #fbd2e0, #f8a8c8) !important;
    }

    /* Warna teks agar tetap terlihat */
    .navbar .nav-link,
    .navbar-brand {
      color: white !important;
      font-weight: 500;
    }

    .navbar .nav-link:hover {
      color: #ffe6f0 !important;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-pink-gradient">
    <div class="container">
      <a class="navbar-brand" href="#">MyWebsite</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Beranda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Tentang</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Layanan</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Kontak</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1>Contoh halaman dengan Navbar Bootstrap</h1>
    <p>Ini adalah contoh halaman sederhana yang menggunakan navbar dari Bootstrap.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
