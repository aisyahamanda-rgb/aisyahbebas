<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas Bootstrap Grid</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      padding: 30px;
    }
    .col-box {
      min-height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-weight: bold;
      border-radius: 8px;
    }
    .nested-box {
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 5px;
      color: #000;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="text-center mb-4">Contoh Grid System Bootstrap 5</h2>

    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-primary"><i class="bi bi-house-door-fill me-2"></i>Kolom 1</div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-success"><i class="bi bi-gear-fill me-2"></i>Kolom 2</div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-danger"><i class="bi bi-heart-fill me-2"></i>Kolom 3</div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-warning text-dark"><i class="bi bi-lightning-charge-fill me-2"></i>Kolom 4</div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-info text-dark"><i class="bi bi-star-fill me-2"></i>Kolom 5</div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="col-box bg-secondary"><i class="bi bi-people-fill me-2"></i>Kolom 6</div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-8">
        <div class="col-box bg-dark">
          Kolom Utama (col-md-8)
        </div>
      </div>
      <div class="col-md-4">
        <div class="p-3 bg-light border rounded">
          <h5 class="text-center mb-3">Nested Grid</h5>
          <div class="row g-2">
            <div class="col-6">
              <div class="nested-box bg-warning">TES 1</div>
            </div>
            <div class="col-6">
              <div class="nested-box bg-info">TES 2</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center mt-4 text-muted">
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
