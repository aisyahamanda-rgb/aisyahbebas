<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Math JavaScript</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #a2c2ee, #c391c4);
    padding: 30px;
  }
  .container{
    background: white;
    padding: 20px;
    width: 350px;
    margin: auto;
    border-radius: 8px;
    box-shadow: 0px 0px 7px rgb(0,0,0,0.2);
  }
  input{
    width: 90%;
    padding: 8px;
    margin-bottom: 10px;
  }
  button{
    padding: 10px;
    width: 90%;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
  }
  button:hover{
    background: #0056b3;
  }
  .result{
    margin-top: 15px;
    background: #fafafa;
    padding: 12px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Aplikasi Perhitungan Math</h2>

  <label>Masukkan Angka:</label>
  <input type="number" id="angka">

  <label>Masukkan Pangkat:</label>
  <input type="number" id="pangkat">

  <button id="hitungBtn">Hitung</button>

  <div class="result" id="hasil"></div>
</div>

<script>
document.getElementById("hitungBtn").addEventListener("click", function(){
  
  let angka = parseFloat(document.getElementById("angka").value);
  let pangkat = parseFloat(document.getElementById("pangkat").value);

  if(isNaN(angka) || isNaN(pangkat)){
    document.getElementById("hasil").innerHTML = "Harap isi semua input!";
    return;
  }

  let hasilHTML = `
    <p>Nilai Absolut (Math.abs): <b>${Math.abs(angka)}</b></p>
    <p>Hasil Pangkat (Math.pow): <b>${Math.pow(angka, pangkat)}</b></p>
    <p>Akar Kuadrat (Math.sqrt): <b>${Math.sqrt(angka)}</b></p>
    <p>Nilai Minimum dari angka & pangkat (Math.min): <b>${Math.min(angka, pangkat)}</b></p>
    <p>Nilai Maksimum dari angka & pangkat (Math.max): <b>${Math.max(angka, pangkat)}</b></p>
    <p>Angka Random 0-1 (Math.random): <b>${Math.random().toFixed(4)}</b></p>
  `;

  document.getElementById("hasil").innerHTML = hasilHTML;

});
</script>

</body>
</html>
