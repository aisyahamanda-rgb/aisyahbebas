<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas Grid Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .box {
      padding: 30px;
      color: white;
      text-align: center;
      border-radius: 8px;
      font-weight: 500;
    }
  </style>
</head>
<body class="p-4">

  <div class="container">

    <h2 class="text-center mb-4">Contoh Grid System Bootstrap 5</h2>

    <div class="row g-3">

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#D92D20;">Kolom 1 <i class="bi bi-house-door"></i></div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#1570EF;">Kolom 2 <i class="bi bi-star"></i></div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#039855;">Kolom 3 <i class="bi bi-people"></i></div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#7F56D9;">Kolom 4 <i class="bi bi-heart"></i></div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#F79009;">Kolom 5 <i class="bi bi-telephone"></i></div>
      </div>

      <div class="col-sm-6 col-md-4 col-lg-2">
        <div class="box" style="background:#444;">Nested Grid:
          <div class="row mt-2 g-1">
            <div class="col-6"><div class="box" style="background:#94A3B8; padding:10px;">A</div></div>
            <div class="col-6"><div class="box" style="background:#64748B; padding:10px;">B</div></div>
          </div>
        </div>
      </div>

    </div>

    <div class="row g-3 mt-4">

      <div class="col-sm-6 col-md-8">
        <div class="box" style="background:#0D9488;">Kolom Lebar <i class="bi bi-layout-text-sidebar-reverse"></i></div>
      </div>

      <div class="col-sm-6 col-md-4">
        <div class="box" style="background:#BE185D;">Kolom Kanan <i class="bi bi-emoji-smile"></i></div>
      </div>

    </div>

  </div>

</body>
</html>
